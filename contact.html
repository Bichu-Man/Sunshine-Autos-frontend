<!DOCTYPE html>

    <link rel="stylesheet" href="vice.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Sunshine Autos</a>

        <input type="checkbox" id="nav-check" class="nav-checkbox">
        <label for="nav-check" class="nav-toggler">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li><a href="index.html" >Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html"class="active">Contact Us</a></li>
            <li><a href="auth.html" class="auth-btn">Login/Signup</a></li>
        </ul>
    </nav>


    <section class="contact-section">
        <h2 class="section-title">Contact Us</h2>
        <div class="contact-container">
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p>📍 Sunshine Autos, Little Havana, Gujjar Pura.</p>
                <p>📞 +92 304 4181 166</p>
                <p>✉️ asfandyarshahbazu1@Sunshine.com</p>
                
            </div>
            <div class="contact-form">
                <form>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" required></textarea>
                    </div>
                    <button type="submit" class="cta-button">Send Message</button>
                </form>
            </div>
        </div>
    </section>
</body>
